name: deals
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.35.5"

dependencies:
  animated_flip_counter: ^0.3.4
  bloc: ^9.0.0
  bot_toast: ^4.1.3
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  connectivity_plus: ^6.1.5
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  device_info_plus: ^11.5.0
  dio: ^5.9.0
  dotted_border: ^3.1.0
  dotted_line: ^3.2.3
  easy_localization: ^3.0.8
  equatable: ^2.0.7
  file_picker: ^10.2.0
  firebase_core: ^3.15.1
  firebase_messaging: ^15.1.3
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^5.2.1
  flutter_image_compress:
  flutter_local_notifications: ^19.3.1
  flutter_rating_bar: ^4.0.1
  flutter_secure_storage: ^9.2.4
  flutter_staggered_grid_view: ^0.7.0
  flutter_sticky_header: ^0.8.0
  flutter_svg: ^2.2.0
  flutter_widget_from_html: ^0.17.0
  flutter_xlider: ^3.5.0
  font_awesome_flutter: ^10.9.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  get_it: ^8.2.0
  get_thumbnail_video: ^0.7.3
  go_router: ^16.0.0
  google_maps_flutter: ^2.12.3
  html: ^0.15.6
  image_picker: ^1.1.2
  infinite_scroll_pagination: ^5.1.0
  injectable:
  intl: ^0.20.2
  logger:
  lottie: ^3.3.1
  open_file: ^3.5.10
  path: ^1.8.0
  path_provider: ^2.1.5
  percent_indicator: ^4.2.3
  permission_handler: ^12.0.0+1
  photo_view: ^0.15.0
  pin_code_fields: ^8.0.1
  pinput: ^5.0.1
  readmore: ^3.0.0
  receive_sharing_intent: ^1.8.1
  rename: ^3.0.2
  responsive_framework: ^1.5.1
  rxdart: ^0.28.0
  share_plus: ^11.0.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  skeletonizer: ^2.1.0+1
  sticky_headers: ^0.3.0+2
  syncfusion_flutter_core: ^31.1.23
  syncfusion_flutter_sliders: ^31.1.23
  timelines_plus: ^1.0.7
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  build_runner:
  flutter_gen_runner: ^5.11.0
  injectable_generator:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/core/resources/gen/
  line_length: 120

  integrations:
    flutter_svg: true
    lottie: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/ic_launcher.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lang/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo/Cairo-Black.ttf
          weight: 900
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal/Tajawal-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Tajawal/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Tajawal/Tajawal-Black.ttf
          weight: 900
    - family: Claudion
      fonts:
        - asset: assets/fonts/Claudion/Claudion.ttf
